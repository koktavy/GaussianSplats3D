  <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",

        }

  </script>
  <style>

    html, body {
      background-color: #000000;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    #gui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    #gui > * {
      pointer-events: auto;
    }

    /* Sidebar Navigation */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      overflow-y: auto;
      transition: transform 0.3s ease;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    #sidebar.collapsed {
      transform: translateX(-300px);
    }

    #sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.5);
    }

    #sidebar-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    #sidebar-header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    #scene-list {
      padding: 10px;
      padding-bottom: 10px;
    }

    .scene-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .scene-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateX(5px);
    }

    .scene-item.active {
      background: rgba(66, 135, 245, 0.3);
      border-color: rgba(66, 135, 245, 0.6);
    }

    .scene-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scene-info {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Toggle Button */
    #sidebar-toggle {
      position: absolute;
      top: 20px;
      left: 320px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 20px;
    }

    #sidebar-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #sidebar.collapsed ~ #sidebar-toggle {
      left: 20px;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    /* Scrollbar Styling */
    #sidebar::-webkit-scrollbar {
      width: 8px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      background-clip: padding-box;
      border: 0.5px solid transparent;
      border-radius: 4px;
    }

    #sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
      background-clip: padding-box;
    }

  </style>

</head>

<body>
  <div id="gui">
    <!-- Sidebar Navigation -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Radiance Portfolio</h1>
        <p id="scene-count">Loading scenes...</p>
      </div>
      <div id="scene-list">
        <div class="loading">Fetching splats...</div>
      </div>
    </div>

    <!-- Sidebar Toggle Button -->
    <div id="sidebar-toggle">☰</div>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { SplatMesh } from '@sparkjsdev/spark';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let lights = new Set();
    let currentSplatMesh = null;
    let currentSceneIndex = null;

    // Setup Three.js scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);

    // Standardized camera setup
    camera.position.set(0, 1.6, 3);  // Standard position: eye level, 3 units back
    camera.up.set(0, 1, 0);           // Standard up vector (Y-axis)
    camera.lookAt(0, 1, 0);           // Look at eye level center

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Setup controls with damping
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);     // Look at eye level center
    controls.enableDamping = true;     // Smooth camera motion
    controls.dampingFactor = 0.13;     // Damping inertia (higher = tighter/more responsive)
    controls.screenSpacePanning = true; // Pan in screen space (horizontal/vertical relative to view)
    controls.minDistance = 0.2;        // Minimum zoom distance
    controls.maxDistance = 50;         // Maximum zoom distance
    controls.maxPolarAngle = Math.PI;  // Allow looking from below
    controls.update();

    // Function to cancel any active camera transition
    function cancelTransition() {
      if (targetTransition) {
        targetTransition = null;
      }
    }

    // Cancel transition when user interacts with OrbitControls (drag, rotate, pan, zoom)
    controls.addEventListener('start', cancelTransition);

    // Listen for scroll wheel to cancel transitions
    renderer.domElement.addEventListener('wheel', cancelTransition);

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // WASD keyboard navigation
    const keyState = {};
    const moveSpeed = 0.05;     // Base movement speed (halved from 0.1)
    const sprintMultiplier = 3; // Sprint speed when holding Shift

    window.addEventListener('keydown', (e) => {
      keyState[e.key.toLowerCase()] = true;
    });

    window.addEventListener('keyup', (e) => {
      delete keyState[e.key.toLowerCase()];
    });

    function handleKeyboardMovement() {
      if (Object.keys(keyState).length === 0) return;

      const speed = keyState['shift'] ? moveSpeed * sprintMultiplier : moveSpeed;

      // Get camera direction vectors
      const forward = new THREE.Vector3();
      camera.getWorldDirection(forward);
      forward.y = 0; // Keep movement horizontal
      forward.normalize();

      const right = new THREE.Vector3();
      right.crossVectors(forward, camera.up).normalize();

      const movement = new THREE.Vector3();

      // WASD movement
      if (keyState['w']) movement.add(forward);
      if (keyState['s']) movement.sub(forward);
      if (keyState['a']) movement.sub(right);
      if (keyState['d']) movement.add(right);

      // Q/E for vertical movement
      if (keyState['q']) movement.y -= 1;
      if (keyState['e']) movement.y += 1;

      // Apply movement - only cancel transition if user is actually moving
      if (movement.length() > 0) {
        // Cancel any active transition when user moves with keyboard
        cancelTransition();

        movement.normalize().multiplyScalar(speed);
        camera.position.add(movement);
        controls.target.add(movement);
      }
    }

    // Raycasting for click-to-orbit
    const raycaster = new THREE.Raycaster();
    let clickMouseDownPos = null;
    let targetTransition = null; // { from: Vector3, to: Vector3, startTime: number, duration: number }

    // Track mouse down position to detect drags
    renderer.domElement.addEventListener('mousedown', (event) => {
      clickMouseDownPos = { x: event.clientX, y: event.clientY };
    });

    renderer.domElement.addEventListener('mouseup', (event) => {
      // Only respond to left clicks
      if (event.button !== 0) return;

      // Ignore if this was a drag (mouse moved more than 5 pixels)
      if (clickMouseDownPos) {
        const dx = event.clientX - clickMouseDownPos.x;
        const dy = event.clientY - clickMouseDownPos.y;
        const dragDistance = Math.sqrt(dx * dx + dy * dy);

        if (dragDistance > 5) {
          clickMouseDownPos = null;
          return; // This was a drag, not a click
        }
      }

      clickMouseDownPos = null;

      // Calculate mouse position in normalized device coordinates (-1 to +1)
      const mouse = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1
      );

      // Update raycaster
      raycaster.setFromCamera(mouse, camera);

      // Find intersections with scene objects
      const intersects = raycaster.intersectObjects(scene.children, true);

      // Find first SplatMesh intersection
      const splatIntersection = intersects.find(i => i.object === currentSplatMesh);

      if (splatIntersection) {
        // Calculate offset from old target to new target
        const offset = new THREE.Vector3()
          .subVectors(splatIntersection.point, controls.target);

        // Start smooth transition - move both camera and target by the same offset
        // This preserves the viewing direction while changing the orbit point
        targetTransition = {
          fromTarget: controls.target.clone(),
          toTarget: splatIntersection.point.clone(),
          fromCamera: camera.position.clone(),
          toCamera: camera.position.clone().add(offset),
          startTime: performance.now(),
          duration: 600 // milliseconds
        };

        console.log('New orbit target:', splatIntersection.point);
      }
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      handleKeyboardMovement();

      // Handle smooth orbit target transition
      if (targetTransition) {
        const elapsed = performance.now() - targetTransition.startTime;
        const progress = Math.min(elapsed / targetTransition.duration, 1);

        // Easing function (ease-out cubic for smooth deceleration)
        const eased = 1 - Math.pow(1 - progress, 3);

        // Interpolate both camera position and target to maintain viewing direction
        controls.target.lerpVectors(targetTransition.fromTarget, targetTransition.toTarget, eased);
        camera.position.lerpVectors(targetTransition.fromCamera, targetTransition.toCamera, eased);

        // End transition when complete
        if (progress >= 1) {
          targetTransition = null;
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();
    
    // ///////////////////////////////////////////
    // Load a specific scene
    // ///////////////////////////////////////////
    const loadScene = async (sceneName, sceneIndex) => {
      console.log('Loading scene:', sceneName);
      // Use direct endpoint instead of CDN to bypass cache issues
      // CDN: https://radiance-pipeline.nyc3.cdn.digitaloceanspaces.com/
      // Direct: https://radiance-pipeline.nyc3.digitaloceanspaces.com/
      const path = 'https://radiance-pipeline.nyc3.digitaloceanspaces.com/' + sceneName;

      try {
        // If a scene is already loaded, remove it first
        if (currentSplatMesh) {
          console.log('Removing current scene before loading new one...');
          scene.remove(currentSplatMesh);
          currentSplatMesh.dispose();
          currentSplatMesh = null;
        }

        // Load the new scene with Spark's SplatMesh
        console.log('Creating new SplatMesh for:', path);
        const splatMesh = new SplatMesh({ url: path });

        // Add to scene
        scene.add(splatMesh);
        currentSplatMesh = splatMesh;

        currentSceneIndex = sceneIndex;
        updateActiveScene(sceneIndex);

        console.log('Scene loaded successfully');
      } catch (error) {
        console.error('Error loading scene:', error);
      }
    }

    // ///////////////////////////////////////////
    // Update UI to show active scene
    // ///////////////////////////////////////////
    const updateActiveScene = (sceneIndex) => {
      document.querySelectorAll('.scene-item').forEach((item, idx) => {
        if (idx === sceneIndex) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    // ///////////////////////////////////////////
    // Populate the scene list UI
    // ///////////////////////////////////////////
    const populateSceneList = (scenes) => {
      const sceneList = document.getElementById('scene-list');
      sceneList.innerHTML = '';

      scenes.forEach((sceneName, index) => {
        const sceneItem = document.createElement('div');
        sceneItem.className = 'scene-item';

        const displayName = sceneName.replace('.ply', '').replace(/-/g, ' ');

        sceneItem.innerHTML = `
          <div class="scene-name">${displayName}</div>
          <div class="scene-info">${sceneName}</div>
        `;

        sceneItem.addEventListener('click', () => {
          loadScene(sceneName, index);
        });

        sceneList.appendChild(sceneItem);
      });

      // Update scene count
      document.getElementById('scene-count').textContent = `${scenes.length} scene${scenes.length !== 1 ? 's' : ''} available`;
    }

    // ///////////////////////////////////////////
    // Sidebar toggle functionality
    // ///////////////////////////////////////////
    const setupSidebarToggle = () => {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');

      toggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        toggle.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
      });
    }

    // ///////////////////////////////////////////
    // Initialize the app
    // ///////////////////////////////////////////
    const init = async () => {
      setupSidebarToggle();

      try {
        // Fetch list of splats from the Spaces bucket
        const response = await fetch('/list');
        if (!response.ok) {
          throw new Error('Network response was... not ok');
        }

        const data = await response.json();

        // Parse the XML response
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(data, "application/xml");
        const contents = xmlDoc.getElementsByTagName("Contents");

        // Extract all .ply files
        const scenes = [];
        for (let i = 0; i < contents.length; i++) {
          const content = contents[i];
          const key = content.getElementsByTagName("Key")[0].textContent;

          if (key.endsWith('.ply')) {
            lights.add(key);
            scenes.push(key);
          }
        }

        // Sort scenes alphabetically
        scenes.sort();

        console.log('Found', scenes.length, 'scenes:', scenes);

        // Populate the UI
        populateSceneList(scenes);

        // Auto-load the first scene
        if (scenes.length > 0) {
          loadScene(scenes[0], 0);
        }

      } catch (error) {
        console.error('Error fetching scenes:', error);
        document.getElementById('scene-list').innerHTML = `
          <div class="loading" style="color: #ff6b6b;">
            Error loading scenes. Please check console.
          </div>
        `;
      }
    };

    // Start the application
    init();
  </script>
</body>
