<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="3DGS, Gaussian Splats, NeRF, Neural Radiance Fields, radiance fields, net art, cool internet graphics lol, lights">
  <meta http-equiv="x-ua-compatible" content="ie=edge">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png">
  <link rel="manifest" href="./assets/favicon/site.webmanifest">
  <title>lights, lol</title>
  <meta name="description" content="The automated Radiance Portfolio">
  <meta name="author" content="Tavius Koktavy">
  <script type="text/javascript" src="js/util.js"></script>
  <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.178.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.178.0/examples/jsm/",
            "@sparkjsdev/spark": "https://sparkjs.dev/releases/spark/0.1.10/spark.module.js"
        }
    }
  </script>
  <style>

    html, body {
      background-color: #000000;
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      position: fixed;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    #gui {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    #gui > * {
      pointer-events: auto;
    }

    /* Sidebar Navigation */
    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      color: #fff;
      overflow-y: auto;
      transition: transform 0.3s ease;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    #sidebar.collapsed {
      transform: translateX(-300px);
    }

    #sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.5);
    }

    #sidebar-header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    #sidebar-header p {
      margin: 5px 0 0 0;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    #scene-list {
      padding: 10px;
    }

    .scene-item {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .scene-item:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateX(5px);
    }

    .scene-item.active {
      background: rgba(66, 135, 245, 0.3);
      border-color: rgba(66, 135, 245, 0.6);
    }

    .scene-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .scene-info {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* Toggle Button */
    #sidebar-toggle {
      position: absolute;
      top: 20px;
      left: 320px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      font-size: 20px;
    }

    #sidebar-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    #sidebar.collapsed ~ #sidebar-toggle {
      left: 20px;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    /* Scrollbar Styling */
    #sidebar::-webkit-scrollbar {
      width: 8px;
    }

    #sidebar::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.2);
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
    }

    #sidebar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.3);
    }

  </style>

</head>

<body>
  <div id="gui">
    <!-- Sidebar Navigation -->
    <div id="sidebar">
      <div id="sidebar-header">
        <h1>Radiance Portfolio</h1>
        <p id="scene-count">Loading scenes...</p>
      </div>
      <div id="scene-list">
        <div class="loading">Fetching splats...</div>
      </div>
    </div>

    <!-- Sidebar Toggle Button -->
    <div id="sidebar-toggle">☰</div>
  </div>
  <script type="module">
    import * as THREE from 'three';
    import { SplatMesh } from '@sparkjsdev/spark';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let lights = new Set();
    let currentSplatMesh = null;
    let currentSceneIndex = null;

    // Setup Three.js scene
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(1.54163, 2.68515, -6.37228);
    camera.up.set(0.01933, -0.75830, -0.65161);
    camera.lookAt(0.45622, 1.95338, 1.51278);

    const renderer = new THREE.WebGLRenderer({ antialias: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Setup controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0.45622, 1.95338, 1.51278);
    controls.update();

    // Handle window resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Animation loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
    
    // ///////////////////////////////////////////
    // Load a specific scene
    // ///////////////////////////////////////////
    const loadScene = async (sceneName, sceneIndex) => {
      console.log('Loading scene:', sceneName);
      // Use direct endpoint instead of CDN to bypass cache issues
      // CDN: https://radiance-pipeline.nyc3.cdn.digitaloceanspaces.com/
      // Direct: https://radiance-pipeline.nyc3.digitaloceanspaces.com/
      const path = 'https://radiance-pipeline.nyc3.digitaloceanspaces.com/' + sceneName;

      try {
        // If a scene is already loaded, remove it first
        if (currentSplatMesh) {
          console.log('Removing current scene before loading new one...');
          scene.remove(currentSplatMesh);
          currentSplatMesh.dispose();
          currentSplatMesh = null;
        }

        // Load the new scene with Spark's SplatMesh
        console.log('Creating new SplatMesh for:', path);
        const splatMesh = new SplatMesh({ url: path });

        // Add to scene
        scene.add(splatMesh);
        currentSplatMesh = splatMesh;

        currentSceneIndex = sceneIndex;
        updateActiveScene(sceneIndex);

        console.log('Scene loaded successfully');
      } catch (error) {
        console.error('Error loading scene:', error);
      }
    }

    // ///////////////////////////////////////////
    // Update UI to show active scene
    // ///////////////////////////////////////////
    const updateActiveScene = (sceneIndex) => {
      document.querySelectorAll('.scene-item').forEach((item, idx) => {
        if (idx === sceneIndex) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });
    }

    // ///////////////////////////////////////////
    // Populate the scene list UI
    // ///////////////////////////////////////////
    const populateSceneList = (scenes) => {
      const sceneList = document.getElementById('scene-list');
      sceneList.innerHTML = '';

      scenes.forEach((sceneName, index) => {
        const sceneItem = document.createElement('div');
        sceneItem.className = 'scene-item';

        const displayName = sceneName.replace('.ply', '').replace(/-/g, ' ');

        sceneItem.innerHTML = `
          <div class="scene-name">${displayName}</div>
          <div class="scene-info">${sceneName}</div>
        `;

        sceneItem.addEventListener('click', () => {
          loadScene(sceneName, index);
        });

        sceneList.appendChild(sceneItem);
      });

      // Update scene count
      document.getElementById('scene-count').textContent = `${scenes.length} scene${scenes.length !== 1 ? 's' : ''} available`;
    }

    // ///////////////////////////////////////////
    // Sidebar toggle functionality
    // ///////////////////////////////////////////
    const setupSidebarToggle = () => {
      const sidebar = document.getElementById('sidebar');
      const toggle = document.getElementById('sidebar-toggle');

      toggle.addEventListener('click', () => {
        sidebar.classList.toggle('collapsed');
        toggle.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
      });
    }

    // ///////////////////////////////////////////
    // Initialize the app
    // ///////////////////////////////////////////
    const init = async () => {
      setupSidebarToggle();

      try {
        // Fetch list of splats from the Spaces bucket
        const response = await fetch('/list');
        if (!response.ok) {
          throw new Error('Network response was... not ok');
        }

        const data = await response.json();

        // Parse the XML response
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(data, "application/xml");
        const contents = xmlDoc.getElementsByTagName("Contents");

        // Extract all .ply files
        const scenes = [];
        for (let i = 0; i < contents.length; i++) {
          const content = contents[i];
          const key = content.getElementsByTagName("Key")[0].textContent;

          if (key.endsWith('.ply')) {
            lights.add(key);
            scenes.push(key);
          }
        }

        // Sort scenes alphabetically
        scenes.sort();

        console.log('Found', scenes.length, 'scenes:', scenes);

        // Populate the UI
        populateSceneList(scenes);

        // Auto-load the first scene
        if (scenes.length > 0) {
          loadScene(scenes[0], 0);
        }

      } catch (error) {
        console.error('Error fetching scenes:', error);
        document.getElementById('scene-list').innerHTML = `
          <div class="loading" style="color: #ff6b6b;">
            Error loading scenes. Please check console.
          </div>
        `;
      }
    };

    // Start the application
    init();
  </script>
</body>

</html>
